tags:
- description: Gadget API compatible devices<ul><li>[SoraCam dedicated cellular pack](/en/guides/soracom-cloud-camera-services/setting-cellular-pack/)</li></ul>
  name: Gadget
- description: '[Soracom Cloud Camera Services](/en/guides/soracom-cloud-camera-services/)'
  name: SoraCam
components:
  schemas:
    SoraCamAtomCamSettingsSound:
      properties:
        state:
          description: 'Settings for sound detection.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
      required:
      - state
      type: object
    SoraCamStreamingVideo:
      properties:
        expiryTime:
          description: Expiration timestamp of all URLs in playList (UNIX time in milliseconds).
          format: int64
          type: integer
        playList:
          description: 'Array of playlist entries for streaming video (latest video / recorded video).


            - For the latest video, only one video file is always returned. In addition, `from` and `to` are omitted.

            - For recorded video, the video file may be split depending on the recording status.

            '
          items:
            $ref: '#/components/schemas/SoraCamPlayListEntry'
          type: array
      required:
      - expiryTime
      type: object
    SoraCamExportVideoToHarvestFiles:
      description: 'Specifies the settings for exporting video to Harvest Files.


        Example: `harvestFiles: { pathPrefix: "/sora_cam/{device_id}" }`


        If the `pathPrefix` is omitted or set to an empty string, the export will be saved in the root directory of Harvest
        Files.


        Example of exporting to the root directory: `harvestFiles: { pathPrefix: "" }`

        '
      properties:
        pathPrefix:
          description: 'The directory name where the video will be saved when exporting to Harvest Files.


            The following strings can be entered, and they will be replaced according to the rules during export:


            - `{export_id}`: The export ID (e.g., `123e4567-e89b-12d3-a456-426614174000`).

            - `{device_id}`: The device ID (e.g., `001A2B3C4D5E`).

            - `{date}`: The request date and time of the export (e.g., `2024/10/01/12/34`).

            - `{from}`: The start time of the video (UNIX time in milliseconds) (e.g., `1728393803000`).

            - `{to}`: The end time of the video (UNIX time in milliseconds) (e.g., `1728394700000`).


            For example, if you enter `/sora_cam/{device_id}`, the video will be exported to a directory unique to each SoraCam
            compatible camera device. `{date}`, `{from}`, and `{to}` are useful when saving videos recorded/exported at the
            same time from multiple SoraCam compatible camera devices to the same directory.


            **Info**: If omitted or set to an empty string, the export will be saved in the root directory of Harvest Files.

            '
          type: string
      type: object
    SoraCamAtomCamSettingsAll:
      properties:
        logo:
          description: 'Display settings for the ATOM tech Inc. logo shown on the bottom left of the captured image.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
        motion:
          description: 'Settings for motion detection.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
        motionSensitivity:
          description: 'Settings for the motion detection sensitivity. The higher the sensitivity, the smaller the image changes
            that can be detected.


            - `high`

            - `medium`

            - `low`

            '
          enum:
          - high
          - medium
          - low
          type: string
        motionTagging:
          description: 'Display settings for motion tagging. Motion tagging is a green frame that is displayed when motion
            is detected.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
        nightVision:
          description: 'Settings for night vision mode.


            - `on`: Night vision mode.

            - `off`: Normal mode.

            - `auto`: Auto-switching.

            '
          enum:
          - 'on'
          - 'off'
          - auto
          type: string
        quality:
          description: 'Settings for the live video and cloud recording quality. Note that for cloud recordings, the resolution
            is 1080p (1920 x 1080 pixels), regardless of the quality setting.


            - `low`: The same quality as selecting "360p" in the ATOM app.

            - `medium`: The same quality as selecting "SD" in the ATOM app.

            - `high`: The same quality as selecting "HD (1080p)" in the ATOM app.

            '
          enum:
          - low
          - medium
          - high
          type: string
        rotation:
          description: 'Settings for rotating the image by 180 degrees. Set to `180` when installing the SoraCam compatible
            camera device upside down.


            - `0`: OFF (no rotation).

            - `180`: ON (180-degree rotation).

            '
          enum:
          - 0
          - 180
          type: integer
        sound:
          description: 'Settings for sound detection.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
        soundSensitivity:
          description: 'Settings for sound detection sensitivity. The higher the sensitivity, the easier it is to detect small
            sounds.


            - `high`

            - `medium`

            - `low`

            '
          enum:
          - high
          - medium
          - low
          type: string
        statusLight:
          description: 'Settings for the status light (indicator light that shows the status of the camera).


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
        timestamp:
          description: 'Display settings for the timestamp shown on the bottom right of the captured image.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
      required:
      - quality
      - statusLight
      - timestamp
      - logo
      - motion
      - motionSensitivity
      - motionTagging
      - sound
      - soundSensitivity
      - nightVision
      type: object
    SoraCamImageExportSpecification:
      properties:
        harvestFiles:
          $ref: '#/components/schemas/SoraCamExportImageToHarvestFiles'
        imageFilters:
          description: Image filters to be applied to the exported image.
          items:
            enum:
            - wide_angle_correction
            type: string
          type: array
        time:
          description: Time to be exported (unix time in milliseconds). A still image is exported from the recorded video
            taken at the specified time.
          format: int64
          type: integer
      required:
      - time
      type: object
    TagUpdateRequest:
      properties:
        tagName:
          type: string
        tagValue:
          type: string
      required:
      - tagName
      - tagValue
      type: object
    SoraCamDeviceLicenseUpdate:
      properties:
        type:
          description: 'Type of license to assign.


            - `CR7-SC`: Cloud Continuous Recording License (7 Days).

            - `CR14-SC`: Cloud Continuous Recording License (14 Days).

            - `CR30-SC`: Cloud Continuous Recording License (30 Days).

            - `MR7-SC`: Cloud Motion Detection "Unlimited" Recording License (7 Days).

            - `MR14-SC`: Cloud Motion Detection "Unlimited" Recording License (14 Days).

            '
          enum:
          - CR7-SC
          - CR14-SC
          - CR30-SC
          - MR7-SC
          - MR14-SC
          type: string
      type: object
    SoraCamImageExportUsage:
      properties:
        billedFrames:
          description: The number of still images, assuming that all of the recorded video time available for export has been
            used for exporting still images. In other words, when the value is 0, no charge is incurred. Note that the billing
            calculation uses `billedSeconds`, not the frame count.
          type: integer
        limitFrames:
          description: The number of still images that can be exported by assuming that all of the available export time for
            the video is used for exporting still images. The recorded video time available for export is output in the number
            of still images that can be exported.
          type: integer
        remainingFrames:
          description: The number of still images that can be exported, assuming that all of the available export time for
            the video is used for exporting still images, up to the maximum possible video export time. `limitFrames` minus
            `usedFrames`.
          type: integer
        usedFrames:
          description: The number of still images exported, assuming that all the recorded video time available for export
            consumed in the current month was used for exporting still images.
          type: integer
      required:
      - billedFrames
      - limitFrames
      - remainingFrames
      - usedFrames
      type: object
    SoraCamDeviceRealTimeAccessOption:
      properties:
        enabled:
          type: boolean
      required:
      - enabled
      type: object
    SoraCamAtomCamSettingsMotionTagging:
      properties:
        state:
          description: 'Display settings for motion tagging.


            - `on`

            - `off`

            '
          enum:
          - 'on'
          - 'off'
          type: string
      required:
      - state
      type: object
    SoraCamAtomCamSettingsRotation:
      properties:
        state:
          description: 'Settings for rotating the image by 180 degrees. Set to `180` when installing the SoraCam compatible
            camera device upside down.


            - `0`: OFF (no rotation).

            - `180`: ON (180-degree rotation).

            '
          enum:
          - 0
          - 180
          type: integer
      required:
      - state
      type: object
    SoraCamDeviceOptions:
      properties:
        realTimeAccess:
          $ref: '#/components/schemas/SoraCamDeviceRealTimeAccessOption'
      required:
      - realTimeAccess
      type: object
    SoraCamEvent:
      properties:
        deviceId:
          description: An identifier to identify the device.
          type: string
        deviceType:
          description: Type of the device.
          format: string
          type: string
        eventId:
          description: An identifier to identify of the event.
          type: string
        eventInfo:
          properties:
            atomEventV1:
              description: Detail of the event.
              properties:
                endTime:
                  description: Timestamp when the event is ended (unix time in milliseconds).
                  format: int64
                  type: integer
                labels:
                  description: List of the detected objects in the event.
                  items:
                    type: string
                  type: array
                movie:
                  description: 'URL of the video recorded by the event; if it has expired, call the API again.


                    - If the Cloud Motion Detection "Unlimited" Recording license is applied, the URL of the video recorded
                    by the motion detection is not included here; use the [SoraCam:exportSoraCamDeviceRecordedVideo API](#!/SoraCam/exportSoraCamDeviceRecordedVideo)
                    to export it.

                    - URLs are included here for events other than motion detection, even if the Cloud Motion Detection "Unlimited"
                    Recording license is applied.

                    '
                  type: string
                picture:
                  description: URL for the picture of `startTime`. If the URL has expired, please call the API again.
                  type: string
                recordingStatus:
                  description: Status of the event recording.
                  enum:
                  - completed
                  - recording
                  - failed
                  type: string
                startTime:
                  description: Timestamp when the event is started (unix time in milliseconds).
                  format: int64
                  type: integer
                type:
                  description: "Type of the event.\n  - `motion`: Motion Alert.\n  - `sound`: Sound Alert.\n  - `other`: Others.\n"
                  enum:
                  - motion
                  - sound
                  - other
                  type: string
              type: object
            infoType:
              description: Type of the event detail. May vary depend on `deviceType`.
              type: string
          required:
          - infoType
          type: object
        time:
          description: Timestamp of the event (unix time in milliseconds).
          format: int64
          type: integer
      required:
      - deviceId
      - eventId
      - time
      - deviceType
      type: object
    SoraCamVideoExportInfo:
      properties:
        deviceId:
          description: Device ID of the SoraCam compatible camera device.
          type: string
        expiryTime:
          description: Expiration timestamp of the URL (unix time in milliseconds). The URL becomes unusable 10 minutes after
            export completion. Only included if `status` is `completed`.
          format: int64
          type: integer
        exportId:
          description: 'Export ID. If you specify the export ID obtained in [SoraCam:exportSoraCamDeviceRecordedVideo API](#!/SoraCam/exportSoraCamDeviceRecordedVideo)
            to [SoraCam:getSoraCamDeviceExportedVideo API](#!/SoraCam/getSoraCamDeviceExportedVideo), you can obtain the URL
            for downloading the zipped mp4 file.

            '
          type: string
        operatorId:
          description: 'Operator ID that called [SoraCam:exportSoraCamDeviceRecordedVideo API](#!/SoraCam/exportSoraCamDeviceRecordedVideo).

            '
          type: string
        requestedTime:
          description: 'The date and time when the Soracom platform accepted the export request from [SoraCam:exportSoraCamDeviceRecordedVideo
            API](#!/SoraCam/exportSoraCamDeviceRecordedVideo) (unix time in milliseconds).

            '
          format: int64
          type: integer
        status:
          description: 'Current status of the export.


            - `initializing`: Initial state.

            - `processing`: Processing.

            - `completed`: Export completed.

            - `retrying`: Retry export.

            - `failed`: Export failed.

            - `limitExceeded`: Video cannot be exported because the recorded video time available for export has been exceeded.

            - `expired`: Exported URL is expired.

            '
          enum:
          - initializing
          - processing
          - completed
          - retrying
          - failed
          - limitExceeded
          - expired
          type: string
        url:
          description: 'URL to download a zipped mp4 file. Only included if `status` is `completed`.


            - You can get mp4 files by extracting the downloaded zip file.

            '
          type: string
      required:
      - exportId
      - requestedTime
      - operatorId
      - deviceId
      - status
      type: object
