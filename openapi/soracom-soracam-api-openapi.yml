          - mp3
          type: string
        from:
          description: Start time for exporting (unix time in milliseconds).
          format: int64
          type: integer
        harvestFiles:
          $ref: '#/components/schemas/SoraCamExportVideoToHarvestFiles'
        to:
          description: 'End time for exporting (unix time in milliseconds).


            - The maximum duration that can be exported in a single API call is 900 seconds (15 minutes). Make sure the difference
            between `from` and `to` does not exceed 900 seconds.

            '
          format: int64
          type: integer
