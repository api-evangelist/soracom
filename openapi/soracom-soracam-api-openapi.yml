          format: int64
          type: integer
        id:
          description: ID of the Gadget API compatible device.
          type: string
        lastModifiedTime:
          description: UNIX time (in milliseconds) that the Gadget API compatible device information was changed.
          format: int64
          type: integer
        operatorId:
          description: Operator ID with which the Gadget API compatible device is registered.
          type: string
        productId:
          description: 'Product ID of the target Gadget API compatible device.


            - `wimax`: Soracom Cloud Camera Services Cellular Pack.

            '
          enum:
          - button
          - wimax
          type: string
        serialNumber:
          description: Serial Number of the target Gadget API compatible device.
          type: string
        status:
          description: 'Contract status of the Gadget API compatible device.


            - `active`: In use.

            - `terminated`: Cancelled.

            '
          enum:
          - active
          - terminated
          type: string
        tags:
          additionalProperties:
            type: string
          description: Tags.
          type: object
        terminatedTime:
          description: The cancellation date and time of the Gadget API compatible device. If not cancelled, `null`.
          format: int64
          type: integer
        terminationEnabled:
          default: false
          description: 'Termination protection for Gadget API compatible device.


            - `true`: OFF (can be cancelled)

            - `false`: ON (cannot cancel)

            '
          type: boolean
