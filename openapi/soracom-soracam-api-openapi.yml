    get:
      description: "Get information for streaming recorded video from the cloud. Specifically, you can get an array of URLs\
        \ that support a streaming method called MPEG-DASH (Dynamic Adaptive Streaming over HTTP). The URL has an expiration\
        \ time.\n\n- To stream the latest video, omit both `from` and `to`. Please be aware of the following points in that\
        \ case:\n  - You can get a URL to stream the latest 300 seconds (5 minutes) of video based on the time of the API\
        \ called. To continue watching, call the API again to get the next URL.\n  - At the time of obtaining the URL, 5 minutes\
        \ of the available video viewing time (72 hours per month by default) will be consumed regardless of the viewing status.\n\
        - To stream recorded video at a specific point in time, specify either `from` or `to`. Please be aware of the following\
        \ points:\n  - You can get a URL to stream up to 900 seconds (15 minutes) of recorded video.\n  - At the time of obtaining\
        \ the URL, the available video viewing time (72 hours per month by default) will be consumed regardless of the viewing\
        \ status.\n\n**Warning**: **Latest video** refers to the most recent recorded footage saved in the cloud. This API\
        \ cannot be used to play **Live streaming video** that can be played on the ATOM app. To view **Live streaming video**,\
        \ use real-time access (Early access).\n\n**Warning**: When calling this API using a SAM User's API key and API token,\
        \ the SAM User must also have permission to call the `OAuth2:authorize` API in addition to permission to call this\
        \ API. For more information on setting permissions, see [Access Levels](/en/docs/security/users-and-roles/#access-levels).\n"
      operationId: getSoraCamDeviceStreamingVideo
      parameters:
      - description: Device ID of the target SoraCam compatible camera device.
        in: path
        name: device_id
        required: true
        schema:
          type: string
      - description: 'Start time of recorded video (UNIX time in milliseconds).


          - Omit both `from` and `to` to get information for streaming the latest video.

          '
        in: query
        name: from
        required: false
        schema:
          format: int64
          type: integer
      - description: 'End time of recorded video (UNIX time in milliseconds).


          - Omit both `from` and `to` to get information for streaming the latest video.

          - The maximum duration that can be viewed in a single API call is 900 seconds (15 minutes). Make sure the difference
          between `from` and `to` does not exceed 900 seconds.

          '
        in: query
        name: to
        required: false
        schema:
          format: int64
          type: integer
      responses:
        '200':
          content:
            application/json:
              example:
