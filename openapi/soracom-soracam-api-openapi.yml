      properties:
        deviceId:
          description: Device ID of the SoraCam compatible camera device.
          type: string
        image:
          $ref: '#/components/schemas/SoraCamImageExportUsage'
          description: The number of still images, assuming that all of the recorded video time available for export is used
            for exporting still images.
        meteredYearMonth:
          description: 'The year and month (format: ''YYYYMM'') for which the video can be exported. In the case of `202301`,
            this means that the available export time of the video for January 2023 is output.'
          type: string
        video:
          $ref: '#/components/schemas/SoraCamVideoExportUsage'
          description: The number of seconds of video, assuming that all of the recorded video time available for export is
