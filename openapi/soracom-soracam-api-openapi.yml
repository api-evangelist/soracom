      type: object
    SoraCamDeviceName:
      properties:
        name:
          type: string
      required:
      - name
      type: object
    SoraCamExportImageToHarvestFiles:
      description: 'Specifies the settings for exporting images to Harvest Files.


        Example: `harvestFiles: { pathPrefix: "/sora_cam/{device_id}" }`


        If the `pathPrefix` is omitted or set to an empty string, the export will be saved in the root directory of Harvest
        Files.


        Example of exporting to the root directory: `harvestFiles: { pathPrefix: "" }`

        '
      properties:
        pathPrefix:
          description: 'The directory name where the images will be saved when exporting to Harvest Files.


            The following strings can be entered, and they will be replaced according to the rules during export:


            - `{export_id}`: The export ID (e.g., `123e4567-e89b-12d3-a456-426614174000`).

            - `{device_id}`: The device ID (e.g., `001A2B3C4D5E`).

            - `{date}`: The request date and time of the export (e.g., `2024/10/01/12/34`).

            - `{time}`: The capture time of the image (UNIX time in milliseconds) (e.g., `1728393803000`).


            For example, if you enter `/sora_cam/{device_id}`, the images will be exported to a directory unique to each SoraCam
            compatible camera device. `{date}` and `{time}` are useful when saving images captured/exported at the same time
            from multiple SoraCam compatible camera devices to the same directory.


            **Info**: If omitted or set to an empty string, the export will be saved in the root directory of Harvest Files.

            '
          type: string
      type: object
    SoraCamAtomCamSettingsMotionSensitivity:
      properties:
        state:
          description: 'Settings for the motion detection sensitivity. The higher the sensitivity, the smaller the image changes
            that can be detected.


            - `high`

            - `medium`

            - `low`

            '
          enum:
          - high
          - medium
          - low
          type: string
      required:
      - state
      type: object
  securitySchemes:
    api_key:
      description: 'API key for authentication. Obtain this from the Soracom User Console or via the Auth API.

        Required in combination with an API token for all authenticated requests.

        '
      in: header
      name: X-Soracom-API-Key
      type: apiKey
    api_token:
      description: 'API token for authentication. This token has an expiration time and must be refreshed periodically.

        Required in combination with an API key for all authenticated requests.'
      in: header
      name: X-Soracom-Token
      type: apiKey
