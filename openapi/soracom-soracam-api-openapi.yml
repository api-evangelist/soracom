    SoraCamVideoExportUsage:
      properties:
        billedSeconds:
          description: The number of seconds of video, assuming that all of the recorded video time available for export has
            been used for exporting video. In other words, when the value is 0, no charge is incurred. Note that only `billedSeconds`
            are used in the calculation of the billing amount.
          type: integer
        limitSeconds:
          description: The number of seconds of video, assuming that all of the available export time for the video is used
            for exporting video. The maximum available export time for the video is output in seconds of video.
          type: integer
        remainingSeconds:
          description: The number of seconds of video that can be exported, assuming that all of  the available export time
            for the video is used for exporting as video, up to the maximum possible video export time. `limitSeconds` minus
            `usedSeconds`.
          type: integer
        usedSeconds:
          description: The number of seconds of video exported, assuming that all the recorded video time available for export
            consumed in the current month was used for exporting video.
          type: integer
      required:
      - billedSeconds
      - limitSeconds
      - remainingSeconds
      - usedSeconds
      type: object
