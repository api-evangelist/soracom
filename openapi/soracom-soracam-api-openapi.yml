        requestedTime:
          description: 'The date and time when the Soracom platform accepted the export request from [SoraCam:exportSoraCamDeviceRecordedImage
            API](#!/SoraCam/exportSoraCamDeviceRecordedImage) (unix time in milliseconds).

            '
