          type: integer
        to:
          description: The end time of the recorded video (UNIX time in milliseconds). Omitted for the latest video.
          format: int64
          type: integer
        url:
          description: "URL to get mpd file of streaming video (latest video / recorded video).\n\n- No URL is returned in\
            \ the following cases:\n  - When trying to get the latest video, the power of the SoraCam compatible camera device\
            \ is not turned on.\n  - When trying to get the latest video, cloud recording has not started on a SoraCam compatible\
            \ camera device.\n  - When trying to get recorded video, there is no recorded video between the specified `from`\
            \ and `to`.\n"
          type: string
