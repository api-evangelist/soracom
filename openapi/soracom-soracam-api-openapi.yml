    post:
      description: 'Saves arbitrary data to Harvest Data that will be associated to a SoraCam compatible camera device specified
        by its device ID (`device_id`).


        For example, to save JSON data, set `Content-Type: application/json` in the header and specify `{ "person_count":
        5 }` in the request body.


        **Warning**: When using a SAM user''s API key and API token to execute this API, you must grant the SAM user the `OAuth2:authorize`
        permission in addition to the permissions required to call this API (e.g., `SoraCam:*`). For details about permission
        settings, refer to [Configuring SAM User Permissions](/en/docs/sam/set-permissions/).


        **Info**: To retrieve saved data entries, use the [DataEntry:getDataEntry API](#/DataEntry/getDataEntry). To delete
        data entries, use the [DataEntry:deleteDataEntry API](#/DataEntry/deleteDataEntry).


        **Info**: For more information about Harvest Data, please refer to [Soracom Harvest](/en/docs/harvest/).

        '
      operationId: createSoraCamDeviceDataEntry
      parameters:
      - description: Device ID of the target SoraCam compatible camera device.
        in: path
        name: device_id
        required: true
        schema:
          type: string
      - description: 'The Content-Type of the data to be saved.


          - For JSON data, specify `application/json`.

          - For text data, specify `text/plain`.

          - For binary data, specify `application/octet-stream`.

          '
        in: header
        name: content-type
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
          application/octet-stream:
            schema:
              format: binary
              type: string
          text/plain:
            schema:
              type: string
        description: The data to be saved.
        required: true
      responses:
        '201':
          description: Data has been successfully saved to Harvest Data.
        '404':
          description: The specified SoraCam compatible camera device could not be found.
      security:
      - api_key: []
        api_token: []
      summary: Save arbitrary data to Harvest Data linked to a SoraCam compatible camera device
      tags:
      - SoraCam
      x-soracom-cli:
      - sora-cam devices data create-entry
