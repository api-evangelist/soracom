            - `BEGINNING_OF_NEXT_DAY`: Execute on the next day at 00:00 (*1).

            - `AFTER_ONE_DAY`: Execute after one day (24 hours later).

            - `NEVER`: Do not execute.


            (*1) Action execution is based on UTC (Coordinated Universal Time). For example, if `BEGINNING_OF_NEXT_DAY` is
            specified, it will be executed when the date changes in UTC, not Japan Time.

            '
          enum:
          - IMMEDIATELY
          - BEGINNING_OF_NEXT_MONTH
          - BEGINNING_OF_NEXT_DAY
          - AFTER_ONE_DAY
          - NEVER
          type: string
        executionOffsetMinutes:
          description: 'Action offset in minutes. The default is `0`. Specify an integer between `0` and `525600` as a String.
            You can delay the actual execution time of the action from the timing specified in `executionDateTimeConst`. For
            more details, refer to [Event Handler](/en/docs/air/event-handler/).

            '
          type: string
        functionName:
          description: AWS Lambda function name. Versions or aliases can also be specified.
          type: string
        headers:
          description: 'HTTP request headers. Specify key and value as an escaped JSON object.


            Example: `"{\"key1\":\"value1\"},{\"key2\":\"value2\"}"`


            - Variables can be used. For more details, refer to [Variables](/en/docs/air/event-handler/#variables).

            '
          type: object
        httpMethod:
          description: HTTP request method.
          enum:
          - GET
          - POST
          - PUT
          - DELETE
          type: string
        message:
          description: 'Body.


            - Variables can be used. For more details, refer to [Variables](/en/docs/air/event-handler/#variables).

            '
          type: string
        parameter1:
          description: 'Value of the parameter to pass to AWS Lambda.


            - Do not specify the same key repeatedly, such as specifying `parameter1` multiple times.

            - Variables can be used. For more details, refer to [Variables](/en/docs/air/event-handler/#variables).

            '
          type: string
        parameter2:
          description: 'Identical to `parameter1`.

            '
          type: string
        parameter3:
          description: 'Identical to `parameter1`.

            '
          type: string
        parameter4:
          description: 'Identical to `parameter1`.

            '
          type: string
        parameter5:
          description: 'Identical to `parameter1`.

            '
