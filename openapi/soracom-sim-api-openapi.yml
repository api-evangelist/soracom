          description: 'The type of session event. It is one of the following:


            - `Created`: The session has been established.

            - `Modified`: The session update (handover) was notified by the base station due to reasons such as device movement
            or changes in radio wave strength.

            - `Deleted`: The session has been disconnected.


            In the case of `Created` or `Modified`, it indicates that the session state is online. In the case of `Deleted`,
            it indicates that the session state is offline. For the meaning of a session, refer to [State (Online/Offline)](/en-us/resources/glossary/session/#state-online-offline).

            '
          type: string
        gatewayPrivateIpAddress:
          description: The private IP address of the VPG. In the case of VPG Type-F, the source IP address of the closed network
            communication from the IoT SIM to the customer's system is NAT-ed to this IP address.
