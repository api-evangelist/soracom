components:
  schemas:
    ImeiLock:
      description: IMEI lock configuration.
      properties:
        imei:
          description: IMEI of the target device
          type: string
      type: object
    LocationRegistrationStatus:
      properties:
        cs:
          $ref: '#/components/schemas/LocationRegistrationStatusForNetwork'
          description: Information on location registration to the CS network
        eps:
          $ref: '#/components/schemas/LocationRegistrationStatusForNetwork'
          description: Information on location registration to the EPS network
        ps:
          $ref: '#/components/schemas/LocationRegistrationStatusForNetwork'
          description: Information on location registration to the PS network
      type: object
    SimplifiedSubscriber:
      properties:
        bundles:
          items:
            type: string
          type: array
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        imsi:
          description: IMSI
          type: string
        msisdn:
          type: string
        status:
          description: 'Status of the IoT SIM (primary subscription of the IoT SIM) or status of the additional subscription.


            For primary subscriptions, it refers to the status of the IoT SIM.


            - `ready`

            - `active`

            - `inactive`

            - `standby`

            - `suspended`

            - `terminated`


            For additional subscriptions, it refers to the status of the additional subscription.


            - `shipped`: OTA is ready or in progress (first half).

            - `delivered`: OTA is in progress (second half).

            - `ready`: OTA is complete.

            - `active`: A connection via the additional subscription has been confirmed. This does not refer to the status
            of the IoT SIM.

            - `terminated`


            The status of the virtual SIM/subscriber is either `active` or `terminated`.

            '
          enum:
          - shipped
          - delivered
          - ready
          - active
          - terminated
          type: string
        subscription:
          type: string
      type: object
    SimDownlinkHttpRequest:
      properties:
        body:
          description: 'HTTP request body.


            **Warning**: The maximum size of an HTTP request, including the URL, headers, and body, is 5 MiB. If it exceeds
            5 MiB, an error will be returned.

            '
          type: string
          x-soracom-cli-param-name: request-body
        headers:
          additionalProperties:
            type: string
          description: HTTP request headers. Specify header names and values as key-value pairs.
          type: object
        host:
          description: Hostname. If not specified, the IP address of the IoT SIM will be used.
          type: string
        method:
          description: HTTP method.
          enum:
          - GET
          - HEAD
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
          - TRACE
          type: string
        path:
          description: 'URL path (e.g., `/path/to/resource`).

            '
          type: string
        port:
          default: 80
          description: Port number for the HTTP connection.
          maximum: 65535
          minimum: 1
          type: integer
        skipVerify:
          default: false
          description: 'Whether to skip SSL certificate verification for HTTPS connections.


            - `true`: Skip verification.

            - `false`: Perform verification. However, if `ssl` is `false` (not using SSL communication), this setting will
            be ignored.

            '
          type: boolean
        ssl:
          default: false
          description: 'Whether to use SSL communication.


            - `true`: Use SSL communication (HTTPS).

            - `false`: Do not use SSL communication (HTTP).

            '
          type: boolean
      type: object
    SimDownlinkTcpConnectionWaitAllOptions:
      description: 'Establishes a TCP connection with the device and sends the specified data, then waits for data reception
        from the device. Then, returns the data received during the time specified by `timeout` or until the device disconnects
        the TCP connection as the API response.


        - If no data is received from the device, after the time specified by `timeout` elapses, the TCP connection is terminated
        and an error is returned.

        '
      properties:
        type:
          enum:
          - wait_all
          type: string
      type: object
    TagUpdateRequest:
      properties:
        tagName:
          type: string
        tagValue:
          type: string
      required:
      - tagName
      - tagValue
      type: object
    SessionStatus:
      description: Information about the current session.
      properties:
        cell:
          $ref: '#/components/schemas/Cell'
        dnsServers:
          description: Array of IP address of the DNS servers.
          items:
            type: string
          type: array
        gatewayPrivateIpAddress:
          description: The private IP address of the VPG. In the case of VPG Type-F, the source IP address of the closed network
            communication from the IoT SIM to the customer's system is NAT-ed to this IP address.
          type: string
        gatewayPublicIpAddress:
          description: The fixed global IP address when using the VPG [Fixed Global IP Address Option](/en/docs/vpg/fixed-global-ip/).
          type: string
        imei:
          description: The IMEI of the device using the IoT SIM. If using a virtual SIM/subscriber, this will be `null`.
          type: string
        imsi:
          description: The IMSI of the IoT SIM.
          type: string
        lastUpdatedAt:
          format: int64
          type: integer
        location:
          type: object
        online:
          description: 'Session status.

            - `true`: online

            - `false`: offline

            '
          type: boolean
        placement:
          $ref: '#/components/schemas/Placement'
        sessionId:
          description: The session ID.
          type: string
        subscription:
          description: The subscription.
          type: string
        ueIpAddress:
          description: The IP address of the device.
          type: string
        vpgId:
          description: The VPG ID. If the VPG was not used, this will not be output.
          type: string
      type: object
    SimDownlinkTcpRequest:
      properties:
        connectionOptions:
          default:
            type: wait_all
          description: Options that specify the behavior of data reception during TCP connection (how the SORACOM API handles
            responses from the device). Choose one of the following.
          oneOf:
          - $ref: '#/components/schemas/SimDownlinkTcpConnectionFireAndForgetOptions'
          - $ref: '#/components/schemas/SimDownlinkTcpConnectionWaitFirstOptions'
          - $ref: '#/components/schemas/SimDownlinkTcpConnectionWaitAllOptions'
          - $ref: '#/components/schemas/SimDownlinkTcpConnectionWaitForPatternOptions'
          - $ref: '#/components/schemas/SimDownlinkTcpConnectionIdleTimeoutOptions'
        payload:
          description: Data to be sent, encoded as a string in the format specified by payloadEncoding. The maximum size is
            5 MiB for the encoded string.
          type: string
        payloadEncoding:
          $ref: '#/components/schemas/SimDownlinkBinaryEncoding'
          description: 'Encoding format for the data to be sent. Specify one of the following. The default is `string`.


            - `string`: Treated as a UTF-8 string.

            - `base64`: Base64 encoding.

            - `hex`: Hexadecimal encoding. Case insensitive.

            '
        port:
          description: Port number for the TCP connection.
          maximum: 65535
          minimum: 1
          type: integer
        timeout:
          default: 30
          description: Timeout duration (seconds) for data transmission and reception. The default value is `30` and the maximum
            value is `300`.
          maximum: 300
          minimum: 1
          type: integer
      required:
      - port
      - payload
      type: object
    SimDownlinkSshNoAuthentication:
      description: 'Configuration for SSH connection with no authentication (`"type": "none"`).

        '
      properties:
        type:
          enum:
          - none
          type: string
      type: object
    CellIdentifier:
      properties:
        cid:
          type: string
        eci:
          type: string
        ecid:
          type: string
        identifier:
          description: An identifier to link a request to the result of that request. Optional.
          type: string
        lac:
          type: string
        mcc:
          type: string
        mnc:
          type: string
        tac:
          type: string
      type: object
    Sim:
      properties:
        activeProfileId:
          type: string
        arcSessionStatus:
          $ref: '#/components/schemas/ArcSessionStatus'
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        createdTime:
          description: UNIX time (in milliseconds) that the IoT SIM (primary subscription to the IoT SIM) was created.
          format: int64
          type: integer
        expiryAction:
          description: 'Action when expiration date expires. Please refer to [Soracom Air Expiration Function](/en/docs/air/expiration/)
            for more detail.


            - `doNothing` : do nothing

            - `deleteSession` : delete session of the SIM if any

            - `deactivate` : change the SIM status to Inactive

            - `suspend` : change the SIM status to Suspended

            - `terminate` : forcibly end any existing connections, and terminate the SIM

            - `null`: No expiration date set.

            '
          enum:
          - doNothing
          - deleteSession
          - deactivate
          - suspend
          - terminate
          - (null value)
          type: string
        expiryTime:
          description: IoT SIM expiration date (UNIX time in milliseconds).
          format: int64
          type: integer
        groupId:
          description: The SIM group ID where the SIM belongs to.
          type: string
        imeiLock:
          $ref: '#/components/schemas/ImeiLock'
        lastModifiedTime:
          description: UNIX time (in milliseconds) that the information in the IoT SIM (primary subscription to the IoT SIM)
            was changed
          format: int64
          type: integer
        lastPortMappingCreatedTime:
          description: UNIX time in milliseconds that Napter was used with the SIM. If Napter has never been used with the
            SIM, null is returned.
          format: int64
          type: integer
        localInfo:
          $ref: '#/components/schemas/Map'
        moduleType:
          description: 'The form factor of the physical SIM.


            - `mini`: standard (2FF) size.

            - `micro`: micro (3FF) size.

            - `nano`: nano (4FF) size.

            - `trio`: 3 in 1 (can be cut into 2FF/3FF/4FF depending on how you cut it).

            - `embedded`: Embedded (MFF2).

            - `virtual`: Virtual SIM/Subscriber.

            - `integrated`: Embedded (iSIM).

            - `profilePackage`: Profile Package (eSIM profile).

            '
          enum:
          - mini
          - micro
          - nano
          - trio
          - embedded
          - virtual
          - integrated
          - profilePackage
          type: string
        operatorId:
          description: The ID of the operator who owns this SIM.
          type: string
        otaSerialNumber:
          type: string
        pcapEndTime:
          format: int64
          type: integer
        pcapStartTime:
          format: int64
          type: integer
        previousSession:
          $ref: '#/components/schemas/PreviousSessionStatus'
        profiles:
          additionalProperties:
            $ref: '#/components/schemas/SimProfile'
          type: object
        renewalFeeStatusSetTime:
          description: UNIX time (in milliseconds) that the IoT SIM status is either "ready", "standby", or "suspended".
          format: int64
          type: integer
        serialNumber:
          description: The serial number of the SIM. Virtual SIM/Subscriber does not have a serial number.
          type: string
        sessionStatus:
          $ref: '#/components/schemas/SessionStatus'
        simId:
          description: The SIM ID of the SIM.
          type: string
        speedClass:
          description: The speed class of the SIM.
          type: string
        status:
          description: 'Status of the IoT SIM (primary subscription of the IoT SIM). The status of the virtual SIM/subscriber
            added to the IoT SIM is either `active` or `terminated`.


            - `ready`

            - `active`

            - `inactive`

            - `standby`

            - `suspended`

            - `terminated`

            '
          enum:
          - ready
          - active
          - inactive
          - standby
          - suspended
          - terminated
          type: string
        tags:
          $ref: '#/components/schemas/TagSet'
        terminationEnabled:
          description: 'Value indicating whether the IoT SIM can be terminated (termination protection setting).


            - `true`: Can be terminated (termination protection OFF)

            - `false`: Cannot be terminated (termination protection ON)

            '
          type: boolean
        testmodeExhaustedTime:
          description: UNIX time (in milliseconds) when the SIM exceeded the testing usage limit.
          format: int64
          type: integer
        type:
          description: 'IoT SIM Type


            - `euicc`: Chip type (eSIM)

            - `uicc`: Card type

            - `virtual`: Virtual SIM/Subscriber

            '
          enum:
          - euicc
          - uicc
          - virtual
          type: string
      type: object
    ArcCredentialAttachRequest:
      properties:
        arcClientPeerPublicKey:
          description: If this parameter is missing, the server generates a keypair.
          type: string
      type: object
    IssueSubscriberTransferTokenRequest:
      properties:
        transferDestinationOperatorEmail:
          description: Primary email address of the destination operator. Please confirm with the owner of the destination
            operator.
          type: string
        transferDestinationOperatorId:
          description: Operator ID of the destination operator. Please confirm with the owner of the destination operator.
