          type: string
      requestBody:
        content:
          application/json:
            example:
            - D-300MB
            schema:
              items:
                description: 'Bundle to set. Specify a bundle supported by the subscription. The bundle name prefix (excluding
                  size suffixes such as `-xxMB` or `-xxGB`) is as follows for each subscription:


                  - plan-D: `D`

                  - plan-DU: `DU`

                  - plan-US: `US`


                  Example: For subscription plan-US, you can set `US-300MB`.


                  **Warning**: Bundles for plan-K2 (K2-300MB), plan-D (D-300MB), planX3, and planX3-EU cannot be changed.

                  '
                enum:
                - D-300MB
                - DU-10GB
                - DU-50GB
                - DU-100GB
                - US-1MB
                - US-3MB
                - US-10MB
                - US-20MB
                - US-50MB
                - US-100MB
                - US-300MB
                - US-500MB
                - US-1GB
                - US-3GB
                - US-5GB
                - US-10GB
                type: string
              type: array
        description: Array of bundles to set for the subscriber.
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscriber'
          description: The subscriber's detailed information after the update.
        '400':
          description: The specified bundle is not supported by this Subscriber's subscription.
        '404':
          description: The specified subscriber does not exist.
      security:
      - api_key: []
        api_token: []
      summary: Set Bundles to Subscriber.
      tags:
