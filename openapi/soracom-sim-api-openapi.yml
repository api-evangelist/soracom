        transferImsi:
          description: 'IMSI of the SIM to be transferred. The IMSI can be obtained from the [Sim:listSims API](#!/Sim/listSims).


            If there is a possibility of canceling SIMs one by one, please specify only one IMSI.

            '
          items:
