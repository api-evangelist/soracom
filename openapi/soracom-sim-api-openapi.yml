  /sims/{sim_id}/profiles/{iccid}/add_subscription:
    post:
      description: Add a new secondary subscription ([additional subscription](/en/docs/air/subscription-containers/#adding-a-subscription)
        or [virtual SIM/Subscriber](/en/docs/arc/configuration/#adding-a-virtual-sim-to-an-air-sim)) to the IoT SIM.
      operationId: addSubscription
      parameters:
      - description: SIM ID of the target SIM.
        in: path
        name: sim_id
        required: true
        schema:
          type: string
      - description: ICCID of the target IoT SIM. For IoT SIMs that do not support eUICC, the ICCID and SIM ID are the same.
        in: path
        name: iccid
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            examples:
              Adding planX3:
                value:
                  enable: true
                  subscription: planX3
                  type: cellular
              Adding virtual SIM/Subscriber:
                value:
                  subscription: planArc01
                  type: virtual
            schema:
              properties:
                enable:
                  description: 'In the case of [additional subscriptions](/en/docs/air/subscription-containers/), specify
                    whether to activate the additional subscription as soon as it has been downloaded. The default is `true`.

                    - `true`: Activate immediately.

                    - `false`: Keep inactive. Additional subscription will be activated at the next [network registration](/en/docs/air/basic-connectivity/#requesting-network-registration)
                    or [session](/en/docs/air/basic-connectivity/#requesting-data-session) registration.


                    Note that in the case of a virtual SIM/Subscriber, it is ignored.

                    '
                  type: boolean
                subscription:
                  description: 'Name of the secondary subscription to be added.

                    - `planP1`, `planX1`, `planX2`, `planX3`, `plan-US-max`: Additional Subscription

                    - `planArc01`: Virtual SIM/Subscriber

                    '
                  enum:
                  - planP1
                  - planX1
                  - planX2
                  - planX3
                  - plan-US-max
                  - planArc01
                  type: string
                type:
                  description: '- `virtual`: When `subscription` is `planArc01`.

                    - `cellular`: When `subscription` is other than `planArc01`.

                    '
                  enum:
                  - virtual
                  - cellular
                  type: string
              required:
              - subscription
              type: object
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimProfile'
          description: The updated SIM profile
        '400':
          description: You specified a subscription that cannot be added. For example, `planP1` cannot be added to an IoT
            SIM in plan-D.
        '404':
          description: No such IoT SIM with the specified SIM ID and ICCID found.
      security:
      - api_key: []
        api_token: []
      summary: Adds a new secondary subscription to an IoT SIM
      tags:
      - Sim
      x-soracom-cli:
      - sims add-subscription
