    SimDownlinkTcpConnectionWaitForPatternOptions:
      description: "Establishes a TCP connection with the device and sends the specified data, then waits for data reception\
        \ from the device. Then, returns the data received until \"the byte pattern specified by `terminationPattern` is received\"\
        \ as the API response.\n\n- In the following cases, an API response indicating an error is returned:\n    - If no\
        \ data is received from the device.\n    \n        After the time specified by `timeout` elapses, the TCP connection\
        \ is terminated and an error is returned.\n    - If data matching the pattern is not received within the time specified\
        \ by `timeout`.\n"
      properties:
        terminationPattern:
          description: The sequence of bytes that ends data reception, encoded as a UTF-8 string in the format specified by
            `terminationPatternEncoding`.
          type: string
        terminationPatternEncoding:
          $ref: '#/components/schemas/SimDownlinkBinaryEncoding'
          description: The encoding method for the byte sequence that ends data reception. The default is `base64`.
        type:
          enum:
          - wait_for_pattern
          type: string
      required:
      - terminationPattern
      type: object
    SimDownlinkHttpResponse:
      properties:
        body:
