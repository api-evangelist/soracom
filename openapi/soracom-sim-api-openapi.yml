  /subscribers/transfer_token/issue:
    post:
      description: 'Initiates the transfer of Ready status SIMs. To use this API, you need an API key and token issued with
        the source operator. When this API is executed, a transfer token is issued and sent to the destination operator via
        email. For more information about SIM transfers, please refer to [Transferring Ready Status SIMs](/en/docs/air/transfer/#transferring-ready-status-sims).


        - To cancel a transfer, cancel each transfer token individually. If there is a possibility of canceling SIMs one by
        one, specify only one IMSI. To cancel, use the [Subscriber:deleteSubscriberTransferToken API](#!/Subscriber/deleteSubscriberTransferToken).

        - When this API is executed, the status of the SIMs will change to "Transferring".


        **Warning**: Do not change the status of SIMs that are in the "Transferring" status. If the status is changed, the
        SIMs can no longer be transferred using this procedure. For the procedure to transfer SIMs whose status has been changed,
        refer to [Transferring Other Status SIMs](/en/docs/air/transfer/#transferring-other-status-sims).


        **Info**: The information of the destination operator can be confirmed by logging in to the Soracom User Console with
        the destination operator.

        '
      operationId: issueSubscriberTransferToken
      requestBody:
        content:
          application/json:
            example:
              transferDestinationOperatorEmail: transfer-destination-XX@example.com
              transferDestinationOperatorId: OPXXXXXXXXXX
              transferImsi:
              - 44XX01234567891
              - 44XX01234567892
              - 44XX01234567893
              - 44XX01234567894
            schema:
              $ref: '#/components/schemas/IssueSubscriberTransferTokenRequest'
        description: Email address and Operator ID of the destination operator, and the IMSIs of the SIMs to be transferred.
        required: true
      responses:
        '200':
          content:
            application/json:
              example:
                token: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
              schema:
                $ref: '#/components/schemas/IssueSubscriberTransferTokenResponse'
          description: 'OK. The status of the SIMs specified in `transferImsi` will change to "Transferring".


            **Warning**: Do not change the status of SIMs that are in the "Transferring" status. If the status is changed,
            the SIMs can no longer be transferred using the API.

            '
      security:
      - api_key: []
        api_token: []
      summary: Initiate the transfer of Ready status SIMs (Issue a transfer token)
      tags:
      - Subscriber
      x-soracom-cli:
      - subscribers issue-transfer-token
  /subscribers/transfer_token/verify:
    post:
      description: Verifies the transfer token for SIMs and accepts the transfer. To use this API, you need an API key and
        token issued with the destination operator.
      operationId: verifySubscriberTransferToken
      requestBody:
        content:
          application/json:
            example:
              token: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
            schema:
