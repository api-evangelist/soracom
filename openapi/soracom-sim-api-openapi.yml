          type: string
        tags:
          $ref: '#/components/schemas/TagSet'
        terminationEnabled:
          description: 'Configure IoT SIM termination protection


            - `true`: Termination protection OFF (can be terminated).

            - `false`: Termination protection ON

            '
          type: boolean
        type:
          description: The speed class of the SIM.
          type: string
      type: object
    DownlinkPingResponse:
      properties:
        rtt:
          description: The RTT of the ping result
          type: string
        stat:
          description: The stats information of the ping result
          type: string
        success:
          description: Whether the ping was succeeded or not
          type: boolean
      type: object
    RegisterSimRequest:
      properties:
        groupId:
          type: string
        registrationSecret:
          description: PUK or PASSCODE on SIM card
          type: string
        tags:
          $ref: '#/components/schemas/TagSet'
      required:
      - registrationSecret
      type: object
    SmsForwardingRequest:
      properties:
        encodingType:
          default: 2
          description: "Encoding type of the message body. Default is `2` (`DCS_UCS2`).\n\n- `1`: Send in GSM 7-bit that only\
            \ supports standard alphabet. Kanji, Cyrillic, and Arabic characters cannot be sent. Maximum 160 characters (maximum\
            \ 140 bytes).\n\n    Example: `{\"encodingType\": 1, \"payload\": \"Test message.\"}`\n- `2`: Send in UCS-2, which\
            \ supports Kanji, Cyrillic, Arabic, etc. Maximum 70 characters.\n\n    Example: `{\"encodingType\": 2, \"payload\"\
            : \"テストメッセージ\"}`\n"
          type: integer
        payload:
          type: string
      type: object
    SimDownlinkSshPublicKeyAuthentication:
      description: 'Configuration for SSH connection using public key authentication (`"type": "publickey"`).

        '
      properties:
        key:
          description: 'Private key (PEM) used for public key authentication. Use `\n` to represent line breaks. This field
            is ignored if `keyCredentialsId` is specified.

            '
          type: string
        keyCredentialsId:
          description: 'Soracom credential set ID where the authentication credentials are registered.


            - **Type**: Select "Private Key (PEM)".

            - **Private Key (PEM)**: Enter the private key (PEM) used for public key authentication.

            '
          type: string
        passphrase:
          description: 'If the private key (PEM) used for public key authentication is protected by a passphrase, specify
            the passphrase.

            '
          type: string
        type:
          enum:
          - publickey
          type: string
      type: object
    SimDownlinkRtspCommandSnapshotHarvestFilesDestinationOptions:
      properties:
        filePath:
          description: 'The filePath to Harvest Files.


            The following strings can be entered, and they will be replaced according to the rules during export:


            - `{sim_id}`: The sim ID (e.g., `0000000000000000000`).

            - `{time}`: The timestamp when the snapshot was taken (UNIX time in milliseconds) (e.g., `1728393803000`).


            **Info**: It is recommended to end the file name with `.jpg` or `.jpeg`.

            '
          example: /path/to/snapshot_{sim_id}_{time}.jpg
          type: string
      required:
      - filePath
      type: object
    SubscriptionContainer:
      properties:
        containerId:
          format: int64
          type: integer
        downloaded:
          type: boolean
        subscriber:
          additionalProperties:
            $ref: '#/components/schemas/Subscriber'
          type: object
      type: object
    SmsForwardingReport:
      properties:
        messageId:
          type: string
      type: object
    SimProfileOrderResponse:
      description: Represents an eSIM profile order.
      properties:
        bundles:
          description: Bundles of the eSIM profile ordered.
          example:
          - X3-5MB
          items:
            type: string
          type: array
        completedTime:
          description: The time the order was completed (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        confirmedTime:
          description: The time the order was confirmed (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        description:
          description: The description of the eSIM profile order.
          example: This is a test order
          type: string
        orderedTime:
          description: The time the order was created (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        profileOrderId:
          description: The ID of the eSIM profile order.
          example: 01902ddd-1cf3-77d9-afc0-fe8d410cadb1
          type: string
        quantity:
          description: The quantity of the eSIM profile ordered.
          example: 10
          format: int32
          type: integer
        speedClass:
          description: The speed class of the eSIM profile ordered.
          example: s1.4xfast
          type: string
        status:
          description: 'The status of the eSIM profile order.


            - `DRAFT`: Unconfirmed order

            - `CONFIRMED`: Order confirmed

            - `IN_PROGRESS`: Order in progress

            - `COMPLETED`: Order completed

            - `FAILED`: Order failed

            '
          enum:
          - DRAFT
          - CONFIRMED
          - IN_PROGRESS
          - COMPLETED
          - FAILED
          example: COMPLETED
          type: string
        subscription:
          description: 'The subscription of the eSIM profile ordered.


            - `plan01s`

            - `planP1`

            - `planX1`

            - `planX2`

            - `planX3`

            - `plan-US`

            '
          example: plan01s
          type: string
      required:
      - profileOrderId
      - subscription
      - quantity
      - status
      - orderedTime
      type: object
    SimDownlinkUdpRequest:
      properties:
        payload:
          description: 'Data to be sent, encoded as a string in the format specified by `payloadEncoding`. The maximum size
            is 1,472 bytes for the encoded string.


            **Warning**: Depending on the network path, the actual maximum size may be smaller. Data exceeding the maximum
            allowable size for the network path may be discarded.

            '
          type: string
        payloadEncoding:
          $ref: '#/components/schemas/SimDownlinkBinaryEncoding'
          description: 'Encoding format for the data to be sent. Specify one of the following. The default is `string`.

            - `string`: Treated as a UTF-8 string.

            - `base64`: Base64 encoding.

            - `hex`: Hexadecimal encoding. Case insensitive.

            '
        port:
          description: Port number for UDP.
          maximum: 65535
          minimum: 1
          type: integer
      required:
      - port
      - payload
      type: object
    SimDownlinkSshRequest:
      properties:
        authentication:
          description: 'Authentication method for SSH connection. Specify one of the following for `type`, and provide the
            required information according to the authentication method.


            - `password`: Password authentication.

            - `publickey`: Public key authentication.

            - `none`: No authentication.

            '
          oneOf:
          - $ref: '#/components/schemas/SimDownlinkSshPasswordAuthentication'
          - $ref: '#/components/schemas/SimDownlinkSshPublicKeyAuthentication'
          - $ref: '#/components/schemas/SimDownlinkSshNoAuthentication'
        command:
          description: Command to be executed on the device via SSH connection. Maximum size is 8192 bytes.
          type: string
        port:
          default: 22
          description: Port number for SSH connection.
          maximum: 65535
          minimum: 1
          type: integer
        username:
          description: Username for SSH connection.
          type: string
      required:
      - username
      - authentication
      - command
      type: object
    FileExportResponse:
      properties:
        exportedFileId:
          description: File Export ID. Specify this ID when calling [Files:getExportedFile API](#!/Files/getExportedFile)
            to get the URL to download the file. Included only if `export_mode` is `async`.
          type: string
        exportedFilePath:
          description: Path of the exported file. Included only if `export_mode` is `async`.
          type: string
        url:
          description: URL to download the file. Included only if `export_mode` is `sync`.
          type: string
      type: object
    PreviousSessionStatus:
      description: Information about the previous session.
      properties:
        cell:
          $ref: '#/components/schemas/Cell'
        createdTime:
          description: The time when the previous session was created.
          format: int64
          type: integer
        deletedTime:
          description: The time when the previous session was deleted.
          format: int64
          type: integer
        dnsServers:
          description: Array of IP address of the DNS servers.
          items:
            type: string
          type: array
        gatewayPrivateIpAddress:
          description: The private IP address of the VPG. In the case of VPG Type-F, the source IP address of the closed network
            communication from the IoT SIM to the customer's system is NAT-ed to this IP address.
          type: string
        gatewayPublicIpAddress:
          description: The fixed global IP address when using the VPG [Fixed Global IP Address Option](/en/docs/vpg/fixed-global-ip/).
          type: string
        imei:
          description: The IMEI of the device using the IoT SIM. If using a virtual SIM/subscriber, this will be `null`.
          type: string
        imsi:
          description: The IMSI of the IoT SIM.
          type: string
        sessionId:
          description: The session ID.
          type: string
        subscription:
          type: string
        ueIpAddress:
          description: The IP address of the device.
          type: string
        vpgId:
          description: The VPG ID. If the VPG was not used, this will not be output.
          type: string
      type: object
    SetImeiLockRequest:
      properties:
        imei:
          description: 'IMEI of the target device. If you want to establish a session even when the IMEI is temporarily not
            reported, append `|ANONYMOUS` to the IMEI value.


            For example, if the IMEI specified is `123456789012345`, specifying `123456789012345|ANONYMOUS` as the parameter
            value will allow a session to be established even when the IMEI is temporarily not reported.

            '
          type: string
      type: object
    ArcSessionCreateResponse:
      properties:
        arcAllowedIPs:
          items:
            type: string
          type: array
        arcClientPeerIpAddress:
          type: string
        arcClientPeerPublicKey:
          type: string
        arcServerEndpoint:
          type: string
        arcServerPeerPublicKey:
          type: string
      type: object
  securitySchemes:
    api_key:
      description: 'API key for authentication. Obtain this from the Soracom User Console or via the Auth API.

        Required in combination with an API token for all authenticated requests.

        '
      in: header
      name: X-Soracom-API-Key
      type: apiKey
    api_token:
      description: 'API token for authentication. This token has an expiration time and must be refreshed periodically.

        Required in combination with an API key for all authenticated requests.'
      in: header
      name: X-Soracom-Token
      type: apiKey
