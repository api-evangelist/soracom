          format: int64
          type: integer
        startedTime:
          description: Date and time when the IoT SIM status changed to "testing" (UNIX time in milliseconds).
          format: int64
          type: integer
        usage:
          description: Data usage and number of SMS sent/received while in testing status.
          properties:
            dataBytes:
              description: Amount of data usage.
              format: int64
              type: integer
            numberOfSms:
              description: Number of SMS sent/received.
              format: int64
              type: integer
          required:
          - dataBytes
          - numberOfSms
          type: object
        usageLimit:
          description: Configuration of the testing status. If any of the thresholds (`days`, `dataBytes`, or `numberOfSms`)
            are exceeded, the IoT SIM status will automatically change to `nextStatus` after `statusTransitionDelayDays` days.
          properties:
            dataBytes:
              description: Amount of data usage exempt from charges during testing status.
              format: int64
              type: integer
            days:
              description: Number of days during which usage charges are waived while in testing status.
              format: int32
              type: integer
            nextStatus:
              description: IoT SIM status to automatically switch to once any testing limit is exceeded.
              enum:
              - active
              - standby
              - suspended
              type: string
            numberOfSms:
              description: Number of SMS sent/received exempt from charges during testing status.
              format: int64
              type: integer
            statusTransitionDelayDays:
              description: Number of days to delay automatic status change after any limit is exceeded.
              format: int32
              type: integer
