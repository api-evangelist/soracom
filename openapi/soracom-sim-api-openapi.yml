        arcClientPeerPublicKey:
          type: string
      type: object
    PacketCaptureSession:
      properties:
        createdTime:
          format: date-time
          type: string
        duration:
          format: int32
          type: integer
        endedTime:
          format: date-time
          type: string
        failedReason:
          type: string
        prefix:
          type: string
        sessionId:
          type: string
        startedTime:
          format: date-time
          type: string
        status:
          enum:
          - REQUESTED
          - ACCEPTED
          - CAPTURING
          - POST_PROCESSING
          - DONE
          - FAILED
          - STOPPED
          type: string
        url:
          format: uri
          type: string
      type: object
    UpdateSpeedClassRequest:
      properties:
        speedClass:
          description: "Speed class. Specify one of the following. Please specify the speed class that matches the subscription.\n\
            \n- For plan01s, plan01s - Low Data Volume, planX3 (X3-5MB), planP1, plan-D (without bundle), plan-D (D-300MB),\
            \ plan-K2 (K2-300MB), plan-K:\n    - `s1.minimum`\n    - `s1.slow`\n    - `s1.standard`\n    - `s1.fast`\n   \
            \ - `s1.4xfast`\n- For plan-US:\n    - `s1.minimum`\n    - `s1.slow`\n    - `s1.standard`\n    - `s1.fast`\n \
            \   - `s1.4xfast`\n    - `s1.8xfast`\n- For plan-DU:\n    - `u1.standard`\n    - `u1.slow`\n\n**Warning**: Speed\
            \ class for plan-KM1 and virtual SIM/Subscriber cannot be changed as there is only one speed class available.\n"
          enum:
          - s1.minimum
          - s1.slow
          - s1.standard
          - s1.fast
          - s1.4xfast
          - s1.8xfast
          - u1.standard
          - u1.slow
          type: string
      required:
      - speedClass
      type: object
    SimDownlinkTcpConnectionIdleTimeoutOptions:
      description: "Establishes a TCP connection with the device and sends the specified data, then waits for data reception\
        \ from the device. After data reception begins, if no data is received for the time specified by `idleTimeout`, returns\
        \ the data received up to that point as the API response.\n\n- In the following cases, an API response indicating\
        \ an error is returned:\n    - If no data is received from the device.\n    \n        After the time specified by\
        \ `timeout` elapses, the TCP connection is terminated and an error is returned.\n    - If the device disconnects the\
        \ TCP connection before sending any data.\n"
      properties:
        idleTimeout:
          description: Time to wait (seconds) after receiving the last data from the device.
          type: integer
        type:
          enum:
          - idle_timeout
          type: string
      required:
      - idleTimeout
      type: object
    SimDownlinkSshPasswordAuthentication:
      description: 'Configuration for SSH connection using password authentication (`"type": "password"`). Specify either
        `password` or `passwordCredentialsId`.

        '
      properties:
        password:
          description: Password for the SSH connection. Ignored if `passwordCredentialsId` is specified.
          type: string
        passwordCredentialsId:
          description: 'Soracom credential set ID where the authentication credentials are registered.


            - **Type**: Select "Pre-Shared key".

            - **Pre-Shared Key**: Enter the password for the SSH connection.

            '
          type: string
        type:
          enum:
          - password
          type: string
      type: object
    ArcCredentialAttachResponse:
      properties:
        arcClientPeerPrivateKey:
          type: string
        arcClientPeerPublicKey:
          type: string
      type: object
    VerifySubscriberTransferTokenRequest:
      properties:
        token:
          description: Transfer token. When a transfer token is issued using the [Subscriber:issueSubscriberTransferToken
            API](#!/Subscriber/issueSubscriberTransferToken), it is sent to the primary email address of the destination operator.
          type: string
      required:
      - token
      type: object
    SimDownlinkRtspAuthenticationBasic:
      description: Configuration for RTSP connection with basic authentication using username and password.
      properties:
        password:
          description: Password for RTSP connection. If `passwordCredentialsId` is specified, this field is ignored.
          type: string
        passwordCredentialsId:
          description: 'Soracom credential set ID where the authentication credentials are registered.


            - **Type**: Select "Pre-Shared key".

            - **Pre-Shared Key**: Enter the password for the RTSP connection.

            '
          type: string
        type:
          enum:
          - basic
          type: string
        username:
          description: Username for RTSP connection.
          type: string
      required:
      - type
      - username
      type: object
    OrderedSimProfileResponse:
      description: Represents an eSIM profile ordered.
      properties:
        activationCode:
          description: The Activation code of the eSIM profile. This value will be used to install the profile on the device.
          example: LPA:1$example.com$ABCDEFGHIJKLMNOPQRSTUVWXYZ
          type: string
        createdTime:
          description: The time the eSIM profile was created (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        iccid:
          description: The ICCID of the eSIM profile.
          example: '12345678901234567890'
          type: string
        imsi:
          description: The IMSI of the eSIM profile.
          example: 123456789012345
          type: string
        installedTime:
          description: The time the eSIM profile was installed (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        lastModifiedTime:
          description: The time the eSIM profile was last modified (unix time in milliseconds).
          example: 1718756585000
          format: int64
          type: integer
        matchingId:
          description: The Matching ID of the eSIM profile. This value will be used to install the profile on the device.
          example: ABCDEFGHIJKLMNOPQRSTUVWXYZ
          type: string
        profileOrderId:
          description: The ID of the eSIM profile order associated with this eSIM profile.
          example: 01902ddd-1cf3-77d9-afc0-fe8d410cadb1
          type: string
        profileStatus:
          description: 'The status of the eSIM profile.


            - `SUBSCRIBER_REGISTRATION_SUCCEEDED`: The IoT SIM corresponding to the eSIM profile has been registered to your
            Soracom operator account

            - `INSTALLATION_SUCCEEDED`: The eSIM profile has been installed on the device

            - `INSTALLATION_FAILED`: The eSIM profile could not be installed on the device

            - `ACTIVATION_SUCCEEDED`: The eSIM profile has been activated on the device

            - `ACTIVATION_FAILED`: The eSIM profile could not be activated on the device

            - `INACTIVATION_SUCCEEDED`: The eSIM profile has been deactivated on the device

            - `INACTIVATION_FAILED`: The eSIM profile could not be deactivated on the device

            - `DELETION_SUCCEEDED`: The eSIM profile has been deleted from the device

            - `DELETION_FAILED`: The eSIM profile could not be deleted from the device

            '
          enum:
          - SUBSCRIBER_REGISTRATION_SUCCEEDED
          - INSTALLATION_SUCCEEDED
          - INSTALLATION_FAILED
          - ACTIVATION_SUCCEEDED
          - ACTIVATION_FAILED
          - INACTIVATION_SUCCEEDED
          - INACTIVATION_FAILED
          - DELETION_SUCCEEDED
          - DELETION_FAILED
          example: DELETION_SUCCEEDED
          type: string
        smdpAddress:
          description: The SM-DP+ address of the eSIM profile. This value will be used to install the profile on the device.
          example: example.com
          type: string
        subscription:
          description: 'The subscription of the eSIM profile.


            - `plan01s`

            - `planP1`

            - `planX1`

            - `planX2`

            - `planX3`

            - `plan-US`

            '
          example: plan01s
          type: string
      required:
      - profileOrderId
      - iccid
      - imsi
      - matchingId
      - smdpAddress
      - activationCode
      - profileStatus
      - createdTime
      - lastModifiedTime
      type: object
    TagSet:
      additionalProperties:
        type: string
      description: An object which always contains at least one property "name" with a string value. If you give a subscriber/SIM
        a name, the name will be returned as the value of the "name" property. If the subscriber/SIM does not have a name,
        an empty string "" is returned. In addition, if you create any custom tags for the subscriber/SIM, each custom tag
        will appear as additional properties in the object.
      example:
        tagName1: tagValue1
        tagName2: tagValue2...
      type: object
    Cell:
      description: Information about the base station to which the IoT SIM is connected. It will not be output for virtual
        SIM/subscribers.
      properties:
        ci:
          description: The Cell Identity (for 2G and 3G networks), a 16 bit value represented in decimal form as an integer.
            (See 3GPP TS 23.003 4.3)
          type: integer
        eci:
          description: The E-UTRAN Cell Identifier (for LTE networks), a 28 bit value represented in decimal form as a long.
            (See 3GPP TS 23.003 19.6)
          type: integer
        lac:
          description: The Location Area Code (for 2G and 3G networks), a 16 bit value represented in decimal form as an integer.
            (See 3GPP TS 23.003 4.1)
          type: integer
        mcc:
          description: The Mobile Country Code, a 3 digit number.
          type: integer
        mnc:
          description: The Mobile Network Code, a 2 or 3 digit number. If the value returned is only 1 digit in length, then
            you should prepend the value with a leading zero.
          type: integer
        rac:
          description: The Routing Area Code (for 2G and 3G networks), an 8 bit value represented in decimal form as an integer.
            (See 3GPP TS 23.003 4.2)
          type: integer
        radioType:
          description: "The Radio Access Technology or type of network that the device is connected to. \n\n**Warning**: In\
            \ some cases, the information displayed may differ from the actual wireless access technology or type of network\
            \ being used by the communication carrier's equipment. For example, even when connected to LTE-M, it may be displayed\
            \ as LTE.\n"
          enum:
          - 3G
          - GSM
          - LTE
          - LTE-M
          - NB-IoT
          type: string
        sac:
          description: The Service Area Code (for 2G and 3G networks), a 16 bit value represented in decimal form as an integer.
            (See 3GPP TS 23.003 12.5)
          type: integer
        tac:
          description: The Tracking Area Code (for LTE networks), a 16 bit value represented in decimal form as an integer.
            (See 3GPP TS 23.003 19.4.2.3)
          type: integer
      type: object
    SimDownlinkTcpConnectionWaitFirstOptions:
      description: "Establishes a TCP connection with the device and sends the specified data. Then, as soon as the first\
        \ data from the device is received, the TCP connection is terminated and the API response is returned.\n\n- Data received\
        \ from the device is not included in the API response.\n- Even if the device continues sending data, the TCP connection\
        \ is disconnected immediately after receiving the first data.\n- In the following cases, an API response indicating\
        \ an error is returned:\n    - If no data is received from the device.\n    \n        After the time specified by\
        \ `timeout` elapses, the TCP connection is terminated and an error is returned.\n    - If the device disconnects the\
        \ TCP connection before sending any data.\n"
      properties:
        type:
          enum:
          - wait_first
          type: string
      type: object
    ArcSessionStatus:
      properties:
