tags:
- description: '- [Virtual Private Gateway (VPG)](/en/docs/vpg/) (Canal / Direct / Door / Gate)

    - [Soracom Junction](/en/docs/junction/)

    - [Soracom Peek](/en/docs/peek/)

    '
  name: VirtualPrivateGateway
components:
  schemas:
    CreateTransitGatewayVpcAttachmentRequest:
      properties:
        customerAwsAccountId:
          description: AWS account ID of the VPC to be attached
          type: string
        customerVpcId:
          description: AWS VPC ID of the VPC to be attached
          type: string
        name:
          description: A name used to identify the VPC attachment
          type: string
      required:
      - customerAwsAccountId
      - customerVpcId
      type: object
    VirtualPrivateGateway:
      properties:
        allowedOperators:
          items:
            type: string
          type: array
        createdTime:
          description: Creation time of the VPG (UNIX time in milliseconds).
          format: int64
          type: integer
        customerRoutes:
          additionalProperties:
            $ref: '#/components/schemas/CustomerRoute'
          description: List of routing table entries
          type: object
        deviceSubnetCidrRange:
          description: Device Subnet IP Address Range.
          type: string
        enableSimBasedRouting:
          type: boolean
        fixedIpAddressesEnabled:
          description: 'Fixed global IP address option.


            - `true`: Enabled.

            - `false`: Disabled.

            '
          type: boolean
        fixedPublicIpAddresses:
          items:
            type: string
          type: array
        gateOpened:
          description: 'The status of [Soracom Gate](/en/docs/gate/) service for the VPG.


            - `true`: Gate is enabled

            - `false`: Gate is disabled

            '
          type: boolean
        gatePrivacySeparatorEnabled:
          type: boolean
        gateVxlanId:
          description: VXLAN ID of the Gate.
          type: number
        implicitTerminationProtected:
          type: boolean
        inspection:
          $ref: '#/components/schemas/JunctionInspectionConfiguration'
        junctionEnabled:
          description: 'The status of [Soracom Junction](/en/docs/junction/) service for the VPG.


            - `true`: Junction (Mirroring, Inspection, or Redirection) is enabled.

            - `false`: Junction is disabled.

            '
          type: boolean
        lastModifiedTime:
          description: Last modified time of the VPG (UNIX time in milliseconds).
          format: int64
          type: integer
        mirroring:
          properties:
            peers:
              additionalProperties:
                $ref: '#/components/schemas/JunctionMirroringPeer'
              type: object
          type: object
        offsetId:
          type: integer
        operatorId:
          description: Operator ID.
          type: string
        placement:
          $ref: '#/components/schemas/Placement'
        primaryServiceName:
          description: (Deprecated) This property is no longer used.
          type: string
        redirection:
          $ref: '#/components/schemas/JunctionRedirectionConfiguration'
        routingFilterEntries:
          items:
            $ref: '#/components/schemas/RoutingFilterEntry'
          type: array
        sessionStats:
          properties:
            lastUpdatedAt:
              description: Date and time (Unix timestamp in milliseconds) that the number of online sessions was last updated.
              format: int64
              type: integer
            online:
              description: Number of Soracom Air IoT SIMs and Soracom Arc Virtual SIMs that are connected to the VPG and online.
                Please note that this number is not updated in real-time. Use the lastUpdatedAt property to check the date
                and time this number was updated.
              type: integer
          type: object
        simBasedRoutingConfig:
          additionalProperties:
            type: string
          type: object
        size:
          description: (Deprecated) This property is no longer used.
          type: string
        soracomTransitGateway:
          $ref: '#/components/schemas/SoracomTransitGateway'
        soracomTransitGatewayPeeringConnections:
          additionalProperties:
            $ref: '#/components/schemas/TransitGatewayPeeringConnection'
          description: Map of transit gateway peering connections associated with the VPG.
          type: object
        soracomTransitGatewayVpcAttachments:
          additionalProperties:
            $ref: '#/components/schemas/TransitGatewayVpcAttachment'
          description: Map of transit gateway VPC attachments associated with the VPG.
          type: object
        status:
          description: 'Status of the VPG.


            - `running`: Running.

            '
          enum:
          - running
          type: string
        tags:
          $ref: '#/components/schemas/TagSet'
        transitGatewayAttachments:
          additionalProperties:
            $ref: '#/components/schemas/TransitGatewayAttachment'
          type: object
        type:
          description: 'VPG Type.


            - `12`: Type-C

            - `13`: Type-D

            - `14`: Type-E

            - `15`: Type-F

            - `242`: Type-F2

            '
          enum:
          - 12
          - 13
          - 14
          - 15
          - 242
          type: integer
        ueSubnetCidrRange:
          description: Device Subnet IP Address Range.
          type: string
        useInternetGateway:
          description: 'The Internet Gateway configuration for the VPG.


            - `true`: Internet Gateway is on

            - `false`: Internet Gateway is off

            '
          type: boolean
        virtualInterfaces:
          additionalProperties:
            type: string
          description: Settings for [Direct](/en/docs/direct/).
          type: object
        vpcPeeringConnections:
          additionalProperties:
            type: string
          description: Settings for [Canal](/en/docs/canal/)'s Amazon VPC peering connections.
          type: object
        vpgId:
          description: VPG ID.
          type: string
        vpgSubnetCidrRange:
          description: The range of IP addresses assigned to the VPG, required for configuring Soracom Door or Soracom Direct.
          type: string
        vpnConnections:
          additionalProperties:
            $ref: '#/components/schemas/VpnConnection'
          type: object
      type: object
    FunnelWingarcMotionboardDestination:
      properties:
        provider:
          enum:
          - wingarc
          type: string
        resourceUrl:
          example: https://iot-cloud.motionboard.jp/motionboard/
          type: string
        service:
          enum:
          - motionboard
          type: string
      type: object
    FunnelKiiThingifDestination:
      properties:
        provider:
          enum:
          - kii
          type: string
        resourceUrl:
          type: string
        service:
          enum:
          - thingif
          type: string
      type: object
    TransitGatewayResourceSharedStatus:
      properties:
        createdTime:
          description: Creation time of the resource share
          type: integer
        customerAwsAccountId:
          description: AWS account ID which is sharing resources with Soracom
          type: string
        lastModifiedTime:
          description: Last modified time of the resource share
          type: integer
        resourceShareArn:
          description: The ARN for the resource share
          type: string
        status:
          description: Status of the resource share. Status of pending implies that the user has yet to accept resource share
            with Soracom on their aws account.
          type: string
      type: object
    OpenGateRequest:
      properties:
        privacySeparatorEnabled:
          default: false
          type: boolean
        vxlanId:
          default: 10
          format: int32
          type: integer
      type: object
    FunnelSensorCorpusDestination:
      properties:
        additionalData:
          type: string
        provider:
          enum:
          - infocorpus
          type: string
        resourceUrl:
          example: https://www.sensorcorpus.net/
          type: string
        service:
          enum:
          - sensorcorpus
          type: string
      type: object
    JunctionMirroringPeer:
      properties:
        description:
          type: string
        enabled:
          default: false
          type: boolean
        ipAddress:
          type: string
        protocol:
          enum:
          - gre
          type: string
      type: object
    CreateVpcPeeringConnectionRequest:
      properties:
        destinationCidrBlock:
          type: string
        peerOwnerId:
          type: string
        peerRegion:
          type: string
        peerVpcId:
          type: string
      type: object
    TransitGatewayVpcAttachment:
      properties:
        createdTime:
          description: Creation time of the VPC attachment
          type: integer
        customerAwsAccountId:
          description: AWS Account ID of the VPC to be attached
          type: string
        customerTransitGatewayVpcAttachmentId:
          description: Transit gateway VPC attachment ID of the VPC to be attached. This is the unique ID of the transit gateway
            VPC attachment.
          type: string
        customerVpcId:
          description: ID of the VPC to be attached
          type: string
        id:
          description: Transit gateway VPC attachment ID of the VPC to be attached. This is the unique ID of the transit gateway
            VPC attachment.
          type: string
        lastModifiedTime:
          description: Last modified time of the VPC attachment
          type: integer
        name:
          description: User defined name of the transit gateway VPC attachment
          type: string
        status:
          description: Current status of the transit gateway VPC attachment. 'vpcAttachmentPending' status implies that a
            VPC attachment is yet to be created on the peer AWS account.
          enum:
          - vpcAttachmentPending
          - acceptancePending
          - active
          - failed
          type: string
      type: object
    PacketCaptureSession:
      properties:
        createdTime:
