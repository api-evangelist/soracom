      type: object
    IpAddressMapEntry:
      properties:
        hostId:
          description: (Deprecated) Use the value of `key` instead.
          type: string
        ipAddress:
          description: 'IP address assigned to the entity identified by the `key`, which can be an IoT SIM, a Gate Peer, or
            the VPG itself.


            - To specify the IP address of an IoT SIM, use the [VirtualPrivateGateway:putVirtualPrivateGatewayIpAddressMapEntry
            API](#/VirtualPrivateGateway/putVirtualPrivateGatewayIpAddressMapEntry).

            - To specify the IP address of a Gate Peer (*1), use the [VirtualPrivateGateway:registerGatePeer API](#/VirtualPrivateGateway/registerGatePeer).

            - IP addresses of a VPG (*1) cannot be manually set.


            (*1) The IP address must be within the device subnet range (an "inner IP address").

            '
          type: string
        key:
          description: 'Identifier of the entity in the IP address map. This can be an IoT SIM, a Gate Peer, or the VPG.


            - For an IoT SIM: The IMSI of the SIM to be assigned an IP address.

            - For a Gate Peers: The IP address (*1).

            - For the VPG: The IP address (*1).


            (*1) The IP address must be within the device subnet range (an "inner IP address").

            '
          type: string
        lastUpdatedAt:
          type: integer
        type:
          description: 'Indicates how the IP address was assigned. One of the following:


            - `static`: A statically assigned IP address specified in the IP address map.

            - `dynamic`: An IP address automatically assigned by the VPG.

            - `customerGatePeer`: An IP address of a customer-managed Gate Peer.

            - `gatePeer`: An IP address of the VPG.


            (*1) The IP address must be within the device subnet range (an "inner IP address").

            '
          enum:
          - static
          - dynamic
          - customerGatePeer
          - gatePeer
          type: string
      required:
      - ipAddress
      - hostId
      - key
      - type
      type: object
    CreateVirtualPrivateGatewayRequest:
      properties:
        deviceSubnetCidrRange:
          default: 10.128.0.0/9
          type: string
        placement:
          properties:
            region:
              description: '[Rendezvous Point](/en/docs/reference/rendezvous-points/) for the VPG.


                - `ap-northeast-1`: Tokyo (Japan), default for Japan Coverage

                - `eu-central-1`: Frankfurt (Germany), default for Global Coverage

                - `us-west-2`: Oregon (USA)

                - `ap-southeast-2`: Sydney (Australia)

                '
              enum:
              - ap-northeast-1
              - eu-central-1
              - us-west-2
              - ap-southeast-2
              type: string
          type: object
        soracomTransitGateway:
          properties:
            asn:
              type: integer
          type: object
        tags:
          $ref: '#/components/schemas/TagSet'
        type:
          description: 'VPG Type.


            - `14` : Type-E

            - `15` : Type-F

            - `242` : Type-F2

            '
          enum:
          - 14
          - 15
          - 242
          type: integer
        useInternetGateway:
          default: true
          type: boolean
      required:
      - type
      type: object
    FunnelDestination:
      properties:
        provider:
          type: string
        resourceUrl:
          type: string
        service:
          type: string
      type: object
    SetVirtualPrivateGatewayVxLanIdRequest:
      properties:
        vxlanId:
          description: VXLAN ID. Specify a range between 1 and 16777215.
          type: integer
      required:
      - vxlanId
      type: object
    FunnelYaskawaMmcloudDestination:
      properties:
        desthost:
          type: string
        destport:
          maximum: 0
          minimum: 65535
          type: integer
        provider:
          enum:
          - yaskawa
          type: string
        resourceUrl:
          type: string
        service:
          enum:
          - mmcloud
          type: string
      type: object
    UpdateVirtualPrivateGatewayTagsRequest:
      items:
        properties:
          tagName:
            type: string
          tagValue:
            type: string
        required:
        - tagName
        - tagValue
        type: object
      type: array
    JunctionInspectionConfiguration:
      properties:
        enabled:
          default: false
          type: boolean
        report:
          $ref: '#/components/schemas/FunnelConfiguration'
      type: object
  securitySchemes:
    api_key:
      description: 'API key for authentication. Obtain this from the Soracom User Console or via the Auth API.

        Required in combination with an API token for all authenticated requests.

        '
      in: header
      name: X-Soracom-API-Key
      type: apiKey
    api_token:
      description: 'API token for authentication. This token has an expiration time and must be refreshed periodically.

        Required in combination with an API key for all authenticated requests.'
      in: header
      name: X-Soracom-Token
      type: apiKey
