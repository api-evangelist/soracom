naftiko: 1.0.0-alpha2
info:
  label: Soracom LoRaWAN Devices Capability
  description: Self-contained Naftiko capability for managing Soracom Air for LoRaWAN devices, gateways, and network sets.
  tags:
  - Soracom
  - LoRaWAN
  - LPWAN
  - Devices
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SORACOM_API_KEY: SORACOM_API_KEY
    SORACOM_API_TOKEN: SORACOM_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: lorawan
    baseUri: https://api.soracom.io/v1
    description: Soracom LoRaWAN device, gateway, and network set API.
    resources:
    - name: lora-devices
      path: /lora_devices
      operations:
      - name: listLoraDevices
        method: GET
        description: List Air for LoRaWAN devices.
        outputRawFormat: json
        outputParameters:
        - {name: result, type: array, value: $.}
        inputParameters: []
    - name: lora-device-by-id
      path: /lora_devices/{device_id}
      operations:
      - name: getLoraDevice
        method: GET
        description: Get a LoRaWAN device.
        outputRawFormat: json
        outputParameters:
        - {name: result, type: object, value: $.}
        inputParameters:
        - {name: device_id, in: path, type: string, required: true}
    - name: lora-gateways
      path: /lora_gateways
      operations:
      - name: listLoraGateways
        method: GET
        description: List LoRaWAN gateways.
        outputRawFormat: json
        outputParameters:
        - {name: result, type: array, value: $.}
        inputParameters: []
    - name: lora-network-sets
      path: /lora_network_sets
      operations:
      - name: listLoraNetworkSets
        method: GET
        description: List LoRaWAN network sets.
        outputRawFormat: json
        outputParameters:
        - {name: result, type: array, value: $.}
        inputParameters: []
    authentication:
      type: apikey
      key: X-Soracom-API-Key
      value: '{{env.SORACOM_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: lorawan-mcp
    port: 9090
    transport: http
    description: MCP adapter for LoRaWAN.
    tools:
    - name: soracom-list-lora-devices
      description: List Soracom LoRaWAN devices.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: lorawan.listLoraDevices
      outputParameters:
      - {type: array, mapping: $.}
    - name: soracom-get-lora-device
      description: Get a LoRaWAN device.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: lorawan.getLoraDevice
      with:
        device_id: tools.device_id
      outputParameters:
      - {type: object, mapping: $.}
    - name: soracom-list-lora-gateways
      description: List LoRaWAN gateways.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: lorawan.listLoraGateways
      outputParameters:
      - {type: array, mapping: $.}
    - name: soracom-list-lora-network-sets
      description: List LoRaWAN network sets.
      hints: {readOnly: true, destructive: false, idempotent: true}
      call: lorawan.listLoraNetworkSets
      outputParameters:
      - {type: array, mapping: $.}
